<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sephora Cafe Menu</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="client-page">
  <main class="layout">
    <section class="hero-card">
      <p class="eyebrow">Carta digital para QR</p>
      <h1>Sephora Cafe</h1>
      <p class="hero-copy">
        Selecciona tus bebidas, revisa tu identificador y envia el pedido a barra.
      </p>

      <div class="demo-switcher">
        <a class="secondary-button button-link" href="/barra">Ver barra</a>
      </div>

      <div class="hero-meta">
        <div class="badge">
          <span class="badge-label">Pedido</span>
          <strong id="order-id">---</strong>
        </div>
        <div class="badge">
          <span class="badge-label">Bebidas</span>
          <strong id="selected-count">0</strong>
        </div>
      </div>
    </section>

    <section class="menu-card">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Menu</p>
          <h2>Bebidas disponibles</h2>
        </div>
        <p class="section-note">Ajusta cantidades y pulsa ENVIAR.</p>
      </div>

      <div id="menu-root" class="menu-grid" aria-live="polite"></div>

      <div class="sticky-submit">
        <div>
          <p class="submit-caption">Identificador visible para seguimiento</p>
          <strong id="submit-order-id">---</strong>
        </div>
        <div class="sticky-submit-actions">
          <a class="secondary-button button-link button-link-contrast" href="/barra">Abrir barra</a>
          <button id="submit-order" class="primary-button" type="button">ENVIAR</button>
        </div>
      </div>

      <p id="status-message" class="status-message" role="status"></p>
    </section>
  </main>

  <script src="/client.js"></script>
</body>
</html>
